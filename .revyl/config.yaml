# Revyl CLI Configuration
# Generated by: revyl init
# Edit these settings or run: revyl config set <key> <value>
# Docs: https://docs.revyl.ai/cli/hot-reload

project:
    name: bug-bazaar-swift
build:
    system: Xcode
    command: xcodebuild -project BugBazaar.xcodeproj -scheme BugBazaar -configuration Debug -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' -derivedDataPath build
    output: build/Build/Products/Debug-iphonesimulator/*.app
    platforms:
        ios:
            command: xcodebuild -project BugBazaar.xcodeproj -scheme BugBazaar -configuration Debug -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' -derivedDataPath build
            output: build/Build/Products/Debug-iphonesimulator/*.app
            app_id: dcc3ba2f-d31e-4953-9d31-f1675120c130
defaults:
    open_browser: false
    timeout: 1800
pr_review:
    enabled: true
    skip_drafts: true
    actions:
        preview_link: true
        proof_of_changes: true
    builds:
        ios:
            enabled: true
            framework: native_ios
            app: dcc3ba2f-d31e-4953-9d31-f1675120c130
            root_dir: ./
            build_command: xcodebuild -project BugBazaar.xcodeproj -scheme BugBazaar -configuration Debug -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' -derivedDataPath build
            artifact_path: build/Build/Products/Debug-iphonesimulator/*.app
