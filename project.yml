name: BugBazaar
options:
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
targets:
  BugBazaar:
    type: application
    platform: iOS
    sources:
      - BugBazaar
    info:
      path: BugBazaar/Info.plist
      properties:
        CFBundleDisplayName: Bug Bazaar
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: com.bugbazaar.app
            CFBundleURLSchemes:
              - bug-bazaar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bugbazaar.app
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGN_IDENTITY: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIUserInterfaceStyle: Light
